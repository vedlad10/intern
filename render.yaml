services:
  - type: web
    name: convorag-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt && python download_model.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300 --preload app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LITE_MODE
        value: "1"
