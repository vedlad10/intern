services:
  - type: web
    name: convorag-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt && python preprocess.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
